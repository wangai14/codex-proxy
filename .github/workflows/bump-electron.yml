name: Bump version + release

on:
  schedule:
    - cron: "0 16 * * *"   # UTC 16:00 = 北京时间 00:00，每天最多一个版本
  workflow_dispatch:

concurrency:
  group: bump-version
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master

      - name: Check for new commits since last tag
        id: check
        run: |
          # Read major.minor from package.json (source of truth for version series)
          PKG_VERSION=$(node -e "console.log(require('./package.json').version)")
          IFS='.' read -r PKG_MAJOR PKG_MINOR _PKG_PATCH <<< "$PKG_VERSION"
          SERIES="${PKG_MAJOR}.${PKG_MINOR}"

          # Find latest stable tag in this series (e.g. v2.0.x). Excludes
          # prerelease tags like v2.0.67-beta.SHA produced by bump-electron-beta.yml.
          LAST_TAG=$(git tag --sort=-v:refname | grep -E "^v${SERIES}\.[0-9]+$" | head -1 || echo "")
          if [ -z "$LAST_TAG" ]; then
            # First release in this series — use any previous stable tag for commit check
            LAST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || echo "")
            if [ -z "$LAST_TAG" ]; then
              echo "No previous tag, skipping"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "New series ${SERIES}.x — will start at ${SERIES}.0"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "new_series=true" >> "$GITHUB_OUTPUT"
            echo "series=$SERIES" >> "$GITHUB_OUTPUT"
            echo "last_tag=$LAST_TAG" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Count commits that affect runtime behavior (skip chore/docs/ci/test/refactor/style)
          NEW_COMMITS=$(git log "${LAST_TAG}..HEAD" --no-merges \
            --pretty=format:"%s" | grep -cvE "^(chore|docs|ci|test|refactor|style)" || true)
          if [ "$NEW_COMMITS" -eq 0 ]; then
            echo "No meaningful commits since $LAST_TAG, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Found $NEW_COMMITS new commit(s) since $LAST_TAG"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "last_tag=$LAST_TAG" >> "$GITHUB_OUTPUT"
          echo "series=$SERIES" >> "$GITHUB_OUTPUT"

      - name: Bump version + tag
        id: bump
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          SERIES="${{ steps.check.outputs.series }}"
          if [ "${{ steps.check.outputs.new_series }}" = "true" ]; then
            NEW_VERSION="${SERIES}.0"
          else
            LAST_TAG="${{ steps.check.outputs.last_tag }}"
            CURRENT="${LAST_TAG#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          NEW_TAG="v${NEW_VERSION}"

          # Check tag doesn't already exist
          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            echo "Tag $NEW_TAG already exists, skipping"
            exit 0
          fi

          # Bump both root and electron package versions
          node -e "
            const fs = require('fs');
            for (const p of ['package.json', 'packages/electron/package.json']) {
              const pkg = JSON.parse(fs.readFileSync(p, 'utf-8'));
              pkg.version = '${NEW_VERSION}';
              fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
            }
          "

          git add package.json packages/electron/package.json
          # If version already matches (e.g. first tag in a new series), skip the commit
          if git diff --cached --quiet; then
            echo "package.json already at ${NEW_VERSION}, tagging without version commit"
          else
            git commit -m "chore: bump version to ${NEW_VERSION} [skip ci]"
          fi
          git tag -a "$NEW_TAG" -m "Release ${NEW_TAG}"

          # Retry push with rebase on conflict (other workflows may push concurrently)
          for i in 1 2 3; do
            if git push origin master --follow-tags; then
              echo "Bumped to $NEW_VERSION, tagged $NEW_TAG"
              echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Push failed (attempt $i/3), rebasing and retrying..."
            git tag -d "$NEW_TAG"
            git pull --rebase origin master
            git tag -a "$NEW_TAG" -m "Release ${NEW_TAG}"
            sleep 2
          done
          echo "::error::Push failed after 3 attempts"
          exit 1

      - name: Sync bump commit back to dev (FF)
        if: steps.bump.outputs.new_tag
        # Without this, every stable bump leaves dev behind master by one commit.
        # The next promote run would then fail FF check ("manual rebase needed")
        # and stay stuck until someone manually rebases dev.
        run: |
          if ! git ls-remote --exit-code --heads origin dev >/dev/null 2>&1; then
            echo "dev branch does not exist, skipping sync"
            exit 0
          fi
          git fetch origin dev:refs/remotes/origin/dev
          if git push origin master:dev; then
            echo "Synced master ($(git rev-parse master)) to dev (FF)"
          else
            echo "::warning::FF push master:dev refused (dev moved during bump window). Manual sync needed."
          fi

      - name: Trigger release workflow
        if: steps.bump.outputs.new_tag
        run: |
          echo "Dispatching release for $NEW_TAG"
          gh workflow run release.yml -f tag="$NEW_TAG"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_TAG: ${{ steps.bump.outputs.new_tag }}
